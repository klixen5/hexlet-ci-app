name: start

on: push

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
            - run: make setup
            - uses: hexlet-components/hello-from-hexlet-action@release

    test:
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
            - run: make setup
            - run: make test
            - uses: hexlet-components/hello-from-hexlet-action@release
    
    lint:
        needs: setup
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 20
            - run: make setup
            - run: make lint
            - uses: hexlet-components/hello-from-hexlet-action@release
    
